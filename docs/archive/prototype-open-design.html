<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GlazePad 透明暂存槽</title>
  <style>
    :root {
      --desk-a: oklch(69% 0.035 232);
      --desk-b: oklch(88% 0.018 235);
      --glass: oklch(95% 0.018 205 / 0.46);
      --glass-strong: oklch(97% 0.022 202 / 0.58);
      --glass-faint: oklch(92% 0.018 205 / 0.24);
      --fg: oklch(22% 0.014 245);
      --muted: oklch(50% 0.014 245);
      --faint: oklch(62% 0.012 245);
      --line: oklch(82% 0.045 205 / 0.42);
      --line-dark: oklch(48% 0.04 205 / 0.18);
      --accent: oklch(58% 0.11 205);
      --accent-soft: oklch(90% 0.042 205 / 0.72);
      --danger: oklch(56% 0.16 25);
      --shadow: 0 30px 76px oklch(38% 0.05 205 / 0.16);
      --font-ui: "Segoe UI Variable", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: "Cascadia Code", "JetBrains Mono", Consolas, ui-monospace, monospace;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      color: var(--fg);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
      background: transparent;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .desktop {
      min-height: 100vh;
      position: relative;
      display: grid;
      place-items: center end;
      padding: clamp(18px, 4vw, 54px);
    }

    .pad {
      position: relative;
      z-index: 1;
      width: min(386px, calc(100vw - 28px));
      height: 336px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        radial-gradient(circle at 18% 8%, oklch(88% 0.065 190 / 0.34), transparent 42%),
        linear-gradient(180deg, oklch(100% 0 0 / 0.30), oklch(88% 0.028 205 / 0.22)),
        var(--glass);
      box-shadow: var(--shadow), inset 0 1px 0 oklch(100% 0 0 / 0.38);
      backdrop-filter: blur(22px) saturate(142%);
      -webkit-backdrop-filter: blur(22px) saturate(142%);
      overflow: hidden;
      transform: translateX(0);
      opacity: 1;
      display: flex;
      flex-direction: column;
      transition: none;
      will-change: transform, opacity;
    }

    .pad.is-hidden {
      transform: translateX(calc(100% + clamp(18px, 4vw, 54px))) scale(0.965);
      opacity: 0;
      pointer-events: none;
    }

    .pad::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      box-shadow: inset 0 -1px 0 oklch(48% 0.04 205 / 0.10);
    }

    .handle {
      height: 26px;
      display: grid;
      place-items: center;
    }

    .handle span {
      width: 42px;
      height: 4px;
      border-radius: 99px;
      background: oklch(100% 0 0 / 0.30);
      box-shadow: 0 1px 0 oklch(42% 0.04 205 / 0.08);
    }

    .top {
      padding: 0 14px 10px;
      display: grid;
      gap: 10px;
      flex: 0 0 auto;
    }

    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 14px;
      line-height: 1.2;
      font-weight: 660;
      letter-spacing: 0;
    }

    .saved {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .top-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .copy-tab,
    .new-tab,
    .hide-pad {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      color: var(--fg);
      background: oklch(96% 0.018 205 / 0.30);
      border: 1px solid oklch(82% 0.05 205 / 0.28);
      box-shadow: inset 0 1px 0 oklch(100% 0 0 / 0.18);
      font-size: 16px;
      line-height: 1;
      transition:
        transform 160ms cubic-bezier(0.2, 0, 0, 1),
        background 160ms ease,
        color 160ms ease,
        border-color 160ms ease;
      will-change: transform;
    }

    .copy-tab:hover,
    .new-tab:hover,
    .hide-pad:hover {
      transform: translateY(-1px);
      background: oklch(92% 0.038 200 / 0.46);
      border-color: oklch(76% 0.07 200 / 0.42);
    }

    .copy-tab:active,
    .new-tab:active,
    .hide-pad:active {
      transform: translateY(0) scale(0.94);
      transition-duration: 80ms;
    }

    .new-tab.danger {
      color: var(--danger);
    }

    .copy-tab {
      color: var(--accent);
      --copy-icon-mask: oklch(96% 0.018 205);
    }

    .copy-tab:hover {
      --copy-icon-mask: oklch(92% 0.038 200);
    }

    .copy-tab svg {
      width: 14px;
      height: 14px;
      stroke-width: 1.8;
    }

    .hide-pad {
      color: oklch(48% 0.13 215);
      font-size: 19px;
      font-weight: 650;
    }

    .hide-pad:hover {
      color: oklch(42% 0.16 215);
    }

    .wake-edge {
      position: fixed;
      right: 0;
      top: 50%;
      z-index: 2;
      width: 10px;
      height: 86px;
      border-radius: 12px 0 0 12px;
      border: 1px solid oklch(78% 0.085 205 / 0.62);
      border-right: 0;
      background:
        linear-gradient(180deg, oklch(87% 0.05 205 / 0.44), oklch(68% 0.12 205 / 0.30)),
        oklch(100% 0 0 / 0.10);
      box-shadow:
        0 0 0 1px oklch(100% 0 0 / 0.18) inset,
        -8px 0 24px oklch(66% 0.13 205 / 0.28),
        0 16px 32px oklch(24% 0.025 245 / 0.10);
      backdrop-filter: blur(14px) saturate(155%);
      -webkit-backdrop-filter: blur(14px) saturate(155%);
      transform: translateY(-50%) translateX(12px);
      opacity: 0;
      pointer-events: none;
      transition:
        transform 280ms cubic-bezier(0.18, 1.22, 0.28, 1),
        opacity 180ms ease,
        width 180ms ease,
        background 180ms ease;
    }

    .wake-edge.is-visible {
      transform: translateY(-50%) translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    .wake-edge.is-pulling {
      width: 9px;
      transform: translateY(-50%) translateX(18px);
      opacity: 0;
      pointer-events: none;
    }

    .tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 1px;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex: 0 0 70px;
      width: 70px;
      height: 28px;
      padding: 0 10px;
      border-radius: 99px;
      color: var(--muted);
      background: oklch(96% 0.018 205 / 0.22);
      border: 1px solid oklch(82% 0.045 205 / 0.24);
      font-size: 12px;
      font-weight: 560;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }

    .tab.active {
      color: oklch(25% 0.035 205);
      background: oklch(88% 0.055 195 / 0.56);
      border-color: oklch(76% 0.07 205 / 0.48);
    }

    .slot {
      margin: 0 14px 14px;
      padding: 0;
      border-radius: 15px;
      background:
        radial-gradient(circle at 12% 0%, oklch(88% 0.05 190 / 0.13), transparent 54%),
        linear-gradient(180deg, oklch(100% 0 0 / 0.28), oklch(92% 0.012 205 / 0.18));
      border: 1px solid oklch(80% 0.032 205 / 0.30);
      box-shadow:
        inset 0 1px 0 oklch(100% 0 0 / 0.40),
        inset 0 1px 18px oklch(48% 0.04 205 / 0.040),
        0 10px 24px oklch(38% 0.035 205 / 0.07);
      height: 183px;
      flex: 0 0 183px;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      contain: layout paint;
    }

    .content-box {
      width: 100%;
      height: 100%;
      min-height: 0;
      resize: none;
      border: 0;
      outline: none;
      border-radius: 15px;
      padding: 14px;
      color: var(--fg);
      background:
        linear-gradient(180deg, oklch(100% 0 0 / 0.48), oklch(99% 0.003 210 / 0.36));
      box-shadow:
        inset 0 1px 0 oklch(100% 0 0 / 0.28);
      font-size: 13px;
      line-height: 1.58;
      overflow: auto;
      transition: border-color 0.16s ease, background 0.16s ease;
    }

    .content-box:focus {
      background:
        linear-gradient(180deg, oklch(100% 0 0 / 0.58), oklch(99% 0.003 210 / 0.42));
    }

    .content-box.mono {
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.55;
    }

    .slot-body {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform-origin: 50% 48%;
    }

    .slot-body.is-switching {
      animation: slotSwitch 190ms cubic-bezier(0.2, 0, 0, 1) both;
    }

    @keyframes slotSwitch {
      0% {
        opacity: 0.72;
        transform: translateY(5px) scale(0.992);
        filter: blur(1px);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    .slot-body[data-kind="image"] .content-box {
      display: none;
    }

    .image-slot {
      position: relative;
      display: none;
      flex: 1 1 auto;
      height: 100%;
      min-height: 0;
      isolation: isolate;
      border: 0;
      border-radius: 15px;
      padding: 0;
      background: transparent;
      box-shadow: none;
      overflow: hidden;
    }

    .image-slot::before,
    .image-slot::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .image-slot::before {
      z-index: 2;
      inset: 0;
      border-radius: 15px;
      background:
        linear-gradient(180deg, transparent 0 72%, oklch(18% 0.035 205 / 0.11) 100%),
        linear-gradient(120deg, oklch(100% 0 0 / 0.18), transparent 38%);
      mix-blend-mode: soft-light;
    }

    .image-slot::after {
      z-index: 3;
      inset: 0;
      border-radius: 15px;
      box-shadow:
        inset 0 0 0 1px oklch(76% 0.055 205 / 0.24),
        inset 0 1px 0 oklch(100% 0 0 / 0.38),
        inset 0 -16px 28px oklch(16% 0.035 205 / 0.09);
      pointer-events: none;
    }

    .slot-body[data-kind="image"] .image-slot {
      display: flex;
      flex-direction: column;
    }

    .image-frame {
      position: relative;
      flex: 1 1 auto;
      height: 100%;
      min-height: 0;
      border-radius: 15px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: oklch(88% 0.022 205 / 0.20);
      border: 0;
      box-shadow:
        0 10px 22px oklch(34% 0.045 205 / 0.08),
        inset 0 1px 0 oklch(100% 0 0 / 0.24);
    }

    .image-frame::before {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 34%;
      z-index: 2;
      border-radius: 0;
      border: 0;
      background: linear-gradient(180deg, transparent, oklch(12% 0.03 205 / 0.12));
      box-shadow: none;
      pointer-events: none;
    }

    .image-frame img {
      width: 100%;
      height: 100%;
      min-height: 0;
      object-fit: cover;
      display: block;
      padding: 0;
      filter:
        saturate(0.98)
        contrast(1.03);
    }

    .image-frame img[src=""] {
      display: none;
    }

    .image-empty {
      display: none;
      color: var(--faint);
      font-size: 12px;
      z-index: 4;
    }

    .image-frame.is-empty .image-empty {
      display: block;
    }

    .image-caption {
      display: none;
    }

    .image-caption strong {
      display: none;
    }

    .image-caption span {
      flex: 0 0 auto;
    }

    .image-type {
      flex: 0 0 auto;
      height: 18px;
      display: inline-grid;
      place-items: center;
      padding: 0 7px;
      border-radius: 99px;
      color: oklch(42% 0.04 205);
      background: oklch(100% 0 0 / 0.24);
      border: 1px solid oklch(100% 0 0 / 0.34);
      font-size: 10px;
      font-weight: 650;
      letter-spacing: 0.04em;
    }

    #imageMeta {
      height: 18px;
      display: inline-grid;
      place-items: center;
      padding: 0 7px;
      border-radius: 99px;
      background: oklch(100% 0 0 / 0.18);
      border: 1px solid oklch(100% 0 0 / 0.24);
      font-variant-numeric: tabular-nums;
    }

    .foot {
      height: 35px;
      padding: 0 15px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--faint);
      font-size: 11px;
      flex: 0 0 auto;
    }

    .foot-left,
    .foot-right {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .foot-left {
      flex: 1 1 auto;
      overflow: hidden;
    }

    .foot-right {
      flex: 0 0 auto;
      justify-content: flex-end;
    }

    .image-foot-meta {
      display: none;
      height: 18px;
      place-items: center;
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: 0;
      font-variant-numeric: tabular-nums;
      color: var(--faint);
    }

    .image-foot-meta.is-visible {
      display: inline-grid;
    }

    .dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: oklch(63% 0.09 205 / 0.72);
    }

    @media (max-width: 720px) {
      body { overflow: auto; }

      .desktop {
        min-height: 100svh;
        place-items: start center;
        padding: 18px 14px;
      }

      .pad {
        width: min(386px, 100%);
        height: 336px;
        margin-top: 8px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }

      .pad,
      .pad.is-hidden {
        transform: translateX(0);
      }

      .pad.is-hidden {
        opacity: 0;
      }

      .slot-body.is-switching {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="desktop">
    <button class="wake-edge" id="wakeEdge" type="button" aria-label="唤醒 GlazePad"></button>

    <section class="pad" id="pad" aria-label="GlazePad 透明暂存槽">
      <div class="handle"><span aria-hidden="true"></span></div>

      <header class="top">
        <div class="bar">
          <div class="brand">
            <h1>GlazePad</h1>
            <span class="saved" id="saveState">已本地保存</span>
          </div>
          <div class="top-actions" aria-label="Tab 操作">
            <button class="copy-tab" id="copySlot" type="button" aria-label="复制当前槽位内容">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <rect x="9" y="5" width="10" height="10" rx="2.8" fill="none" stroke="currentColor"></rect>
                <rect x="5" y="9" width="10" height="10" rx="2.8" fill="var(--copy-icon-mask)" stroke="currentColor"></rect>
              </svg>
            </button>
            <button class="new-tab danger" id="deleteTab" type="button" aria-label="删除当前 Tab">−</button>
            <button class="new-tab" id="addTab" type="button" aria-label="新增 Tab 并收纳当前剪贴板">+</button>
            <button class="hide-pad" id="hidePad" type="button" aria-label="隐藏 GlazePad">›</button>
          </div>
        </div>
        <nav class="tabs" id="tabs" aria-label="暂存槽"></nav>
      </header>

      <section class="slot" aria-label="当前暂存内容">
        <div class="slot-body" id="slotBody" data-kind="text">
          <textarea class="content-box" id="slotContent" spellcheck="false" aria-label="暂存内容"></textarea>
          <div class="image-slot" id="imageSlot" aria-label="暂存图片预览">
            <div class="image-frame">
              <img id="slotImage" alt="当前暂存图片" />
              <span class="image-empty">等待收纳图片</span>
            </div>
            <div class="image-caption">
              <strong id="imageName">剪贴板图片</strong>
              <span class="image-type" id="imageType">IMG</span>
              <span id="imageMeta">IMG · —</span>
            </div>
          </div>
        </div>
      </section>

      <footer class="foot">
        <span class="foot-left">
          <span id="slotMeta">4 个暂存槽</span>
          <span id="footerImageMeta" class="image-foot-meta">PNG · 1024×768</span>
        </span>
        <span class="foot-right dots"><span class="dot"></span><span>透明桌面模式</span></span>
      </footer>
    </section>
  </main>

  <script>
    const clipboardSamples = [
      "明天下午 3 点前确认最终方案，重点看 Tab 槽位、透明浮窗和复制流程。",
      "const slot = await navigator.clipboard.readText();\ncreateTab({ title: `Tab ${tabs.length + 1}`, content: slot });",
      "会议记录：GlazePad 的 Tab 是独立暂存槽，不是分类；窗口要短、透明、轻。",
      "发版提醒：先验证 Windows 贴边、置顶、透明背景，再接入真实剪贴板权限。"
    ];

    const fallbackImage = {
      url: "mqf6vz3m-image.png",
      name: "桌面截图.png",
      meta: "PNG · 1024×768"
    };

    const state = {
      activeId: "tab-1",
      clipIndex: 0,
      tabs: [
        { id: "tab-1", title: "Tab 1", type: "text", content: "把临时要复用的内容放在这里。当前 Tab 只有这一个存储框。" },
        { id: "tab-2", title: "Tab 2", type: "text", content: "例如：一段回复、一条命令、一个链接，随时改、随时复制。" },
        { id: "tab-3", title: "Tab 3", type: "image", content: "", imageUrl: fallbackImage.url, imageName: fallbackImage.name, imageMeta: fallbackImage.meta },
        { id: "tab-4", title: "Tab 4", type: "text", content: "" }
      ]
    };

    const tabsEl = document.getElementById("tabs");
    const pad = document.getElementById("pad");
    const wakeEdge = document.getElementById("wakeEdge");
    const slotBody = document.getElementById("slotBody");
    const slotContent = document.getElementById("slotContent");
    const imageFrame = document.querySelector(".image-frame");
    const slotImage = document.getElementById("slotImage");
    const imageName = document.getElementById("imageName");
    const imageType = document.getElementById("imageType");
    const imageMeta = document.getElementById("imageMeta");
    const slotMeta = document.getElementById("slotMeta");
    const footerImageMeta = document.getElementById("footerImageMeta");
    const saveState = document.getElementById("saveState");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

    function currentTab() {
      return state.tabs.find((tab) => tab.id === state.activeId) || state.tabs[0];
    }

    function setSaved(text = "已本地保存") {
      saveState.textContent = text;
      window.clearTimeout(setSaved.timer);
      if (text === "已本地保存") return;
    }

    function renderTabs() {
      tabsEl.innerHTML = state.tabs.map((tab) => {
        const active = tab.id === state.activeId ? " active" : "";
        return `<button class="tab${active}" type="button" data-id="${tab.id}">${tab.title}</button>`;
      }).join("");
    }

    function renderSlot() {
      const tab = currentTab();
      const kind = tab.type === "image" ? "image" : "text";
      slotBody.dataset.kind = kind;
      slotContent.value = tab.content || "";
      slotContent.disabled = kind === "image";
      slotContent.classList.toggle("mono", /const|function|await|=>|npm|git|\.js|\.tsx/.test(tab.content || ""));
      slotImage.src = tab.imageUrl || "";
      imageFrame.classList.toggle("is-empty", kind === "image" && !tab.imageUrl);
      imageName.textContent = tab.imageName || "剪贴板图片";
      imageType.textContent = imageTypeLabel(tab.imageMeta || tab.imageName || "IMG");
      imageMeta.textContent = tab.imageMeta || "IMG · —";
      slotMeta.textContent = `${state.tabs.length} 个暂存槽 · ${kind === "image" ? "图片" : "文本"}`;
      footerImageMeta.textContent = tab.imageMeta || "IMG · —";
      footerImageMeta.classList.toggle("is-visible", kind === "image");
    }

    function measureImage(url) {
      return new Promise((resolve) => {
        if (!url) {
          resolve("");
          return;
        }
        const probe = new Image();
        probe.onload = () => resolve(`${probe.naturalWidth}×${probe.naturalHeight}`);
        probe.onerror = () => resolve("");
        probe.src = url;
      });
    }

    function imageTypeLabel(mimeOrName = "") {
      const lower = mimeOrName.toLowerCase();
      if (lower.includes("png")) return "PNG";
      if (lower.includes("jpeg") || lower.includes("jpg")) return "JPG";
      if (lower.includes("webp")) return "WEBP";
      if (lower.includes("gif")) return "GIF";
      return "IMG";
    }

    async function imageMetaFor(url, mimeOrName) {
      const size = await measureImage(url);
      const label = imageTypeLabel(mimeOrName);
      return size ? `${label} · ${size}` : `${label} · —`;
    }

    function render() {
      renderTabs();
      renderSlot();
    }

    function pulseSlot() {
      if (reduceMotion.matches) return;
      slotBody.classList.remove("is-switching");
      void slotBody.offsetWidth;
      slotBody.classList.add("is-switching");
    }

    let padMotion = null;

    function hiddenTransform() {
      return "translateX(calc(100% + clamp(18px, 4vw, 54px))) scaleX(0.94) scaleY(0.99)";
    }

    function stopPadMotion() {
      if (!padMotion) return;
      padMotion.cancel();
      padMotion = null;
    }

    function animatePad(keyframes, options, done) {
      stopPadMotion();
      padMotion = pad.animate(keyframes, { fill: "forwards", ...options });
      padMotion.onfinish = () => {
        padMotion = null;
        done();
      };
      padMotion.oncancel = () => {
        padMotion = null;
      };
    }

    function setHidden(hidden) {
      wakeEdge.classList.remove("is-pulling");
      if (reduceMotion.matches) {
        stopPadMotion();
        pad.classList.toggle("is-hidden", hidden);
        wakeEdge.classList.toggle("is-visible", hidden);
        pad.style.transform = hidden ? hiddenTransform() : "translateX(0) scaleX(1) scaleY(1)";
        pad.style.opacity = hidden ? "0" : "1";
        setSaved(hidden ? "已隐藏，按 Alt + Space 唤醒" : "已唤醒");
        if (!hidden) {
          requestAnimationFrame(() => {
            slotContent.focus({ preventScroll: true });
          });
        }
        return;
      }
      if (hidden) {
        wakeEdge.classList.remove("is-visible");
        animatePad([
          { transform: "translateX(0) scaleX(1) scaleY(1)", opacity: 1, offset: 0 },
          { transform: "translateX(-26px) scaleX(1.035) scaleY(0.99)", opacity: 1, offset: 0.24 },
          { transform: "translateX(32px) scaleX(0.955) scaleY(1.012)", opacity: 0.96, offset: 0.48 },
          { transform: hiddenTransform(), opacity: 0, offset: 1 }
        ], {
          duration: 430,
          easing: "cubic-bezier(0.62, 0, 0.18, 1)"
        }, () => {
          pad.classList.add("is-hidden");
          pad.style.transform = hiddenTransform();
          pad.style.opacity = "0";
          wakeEdge.classList.add("is-visible");
        });
        setSaved("已隐藏，按 Alt + Space 唤醒");
        return;
      }
      wakeEdge.classList.remove("is-visible");
      wakeEdge.classList.add("is-pulling");
      pad.classList.remove("is-hidden");
      pad.style.transform = hiddenTransform();
      pad.style.opacity = "0";
      pad.getBoundingClientRect();
      animatePad([
        { transform: hiddenTransform(), opacity: 0, offset: 0 },
        { transform: "translateX(62px) scaleX(0.952) scaleY(1.012)", opacity: 0.62, offset: 0.38 },
        { transform: "translateX(-44px) scaleX(1.052) scaleY(0.982)", opacity: 1, offset: 0.68 },
        { transform: "translateX(16px) scaleX(0.986) scaleY(1.004)", opacity: 1, offset: 0.84 },
        { transform: "translateX(-6px) scaleX(1.004) scaleY(0.999)", opacity: 1, offset: 0.93 },
        { transform: "translateX(0) scaleX(1) scaleY(1)", opacity: 1, offset: 1 }
      ], {
        duration: 760,
        easing: "cubic-bezier(0.14, 0.84, 0.14, 1)"
      }, () => {
        pad.style.transform = "translateX(0) scaleX(1) scaleY(1)";
        pad.style.opacity = "1";
        wakeEdge.classList.remove("is-pulling");
      });
      setSaved("已唤醒");
      requestAnimationFrame(() => {
        slotContent.focus({ preventScroll: true });
      });
    }

    function toggleHidden() {
      setHidden(!pad.classList.contains("is-hidden"));
    }

    function simulatedClipboard() {
      const text = clipboardSamples[state.clipIndex % clipboardSamples.length];
      state.clipIndex += 1;
      return text;
    }

    async function readClipboardPayload() {
      if (navigator.clipboard && navigator.clipboard.read) {
        try {
          const items = await navigator.clipboard.read();
          for (const item of items) {
            const imageType = item.types.find((type) => type.startsWith("image/"));
            if (imageType) {
              const blob = await item.getType(imageType);
              const imageUrl = URL.createObjectURL(blob);
              return {
                type: "image",
                imageUrl,
                imageName: imageType.replace("/", "."),
                imageMeta: await imageMetaFor(imageUrl, imageType)
              };
            }
          }
        } catch (_) {
          // Browser preview may deny image clipboard access; text fallback below keeps the prototype usable.
        }
      }

      if (navigator.clipboard && navigator.clipboard.readText) {
        try {
          const text = await navigator.clipboard.readText();
          if (text.trim()) return { type: "text", content: text };
        } catch (_) {}
      }

      const shouldShowImageDemo = state.tabs.every((tab) => tab.type !== "image" || !tab.imageUrl || tab.imageUrl.startsWith("blob:"));
      if (shouldShowImageDemo) {
        return { type: "image", imageUrl: fallbackImage.url, imageName: fallbackImage.name, imageMeta: fallbackImage.meta };
      }
      return { type: "text", content: simulatedClipboard() };
    }

    tabsEl.addEventListener("click", (event) => {
      const button = event.target.closest(".tab");
      if (!button) return;
      if (state.activeId === button.dataset.id) return;
      state.activeId = button.dataset.id;
      render();
      pulseSlot();
    });

    document.getElementById("addTab").addEventListener("click", async () => {
      const payload = await readClipboardPayload();
      const next = state.tabs.length + 1;
      const tab = {
        id: `tab-${Date.now()}`,
        title: `Tab ${next}`,
        type: payload.type,
        content: payload.content || "",
        imageUrl: payload.imageUrl || "",
        imageName: payload.imageName || "",
        imageMeta: payload.imageMeta || ""
      };
      state.tabs.push(tab);
      state.activeId = tab.id;
      render();
      pulseSlot();
      requestAnimationFrame(() => {
        tabsEl.scrollLeft = tabsEl.scrollWidth;
      });
      setSaved(payload.type === "image" ? "已收纳图片" : "已新增 Tab");
    });

    document.getElementById("hidePad").addEventListener("click", () => {
      setHidden(true);
    });

    wakeEdge.addEventListener("click", () => {
      setHidden(false);
    });

    document.getElementById("deleteTab").addEventListener("click", () => {
      if (state.tabs.length <= 1) {
        setSaved("至少保留一个暂存槽");
        return;
      }
      const index = state.tabs.findIndex((tab) => tab.id === state.activeId);
      state.tabs.splice(index, 1);
      const nextIndex = Math.min(index, state.tabs.length - 1);
      state.activeId = state.tabs[nextIndex].id;
      render();
      pulseSlot();
      setSaved("已删除 Tab");
    });

    slotContent.addEventListener("input", () => {
      const tab = currentTab();
      if (tab.type === "image") return;
      tab.content = slotContent.value;
      slotContent.classList.toggle("mono", /const|function|await|=>|npm|git|\.js|\.tsx/.test(tab.content));
      setSaved("正在保存");
    });

    document.getElementById("copySlot").addEventListener("click", async () => {
      const copyButton = document.getElementById("copySlot");
      const tab = currentTab();
      if (tab.type === "image") {
        if (!tab.imageUrl || !navigator.clipboard || !window.ClipboardItem) {
          setSaved("图片等待接入复制");
          return;
        }
        try {
          const blob = await fetch(tab.imageUrl).then((res) => res.blob());
          await navigator.clipboard.write([new ClipboardItem({ [blob.type || "image/png"]: blob })]);
          setSaved("已复制图片");
        } catch (_) {
          setSaved("图片等待接入复制");
        }
        return;
      }
      try {
        await navigator.clipboard.writeText(tab.content);
        setSaved("已复制");
      } catch (_) {
        setSaved("复制需要浏览器权限");
      }
      copyButton.focus({ preventScroll: true });
    });

    document.addEventListener("keydown", (event) => {
      const isAltSpace = event.altKey && event.code === "Space";
      if (isAltSpace) {
        event.preventDefault();
        toggleHidden();
        return;
      }
      if (event.key === "Escape" && !pad.classList.contains("is-hidden")) {
        event.preventDefault();
        setHidden(true);
      }
    });

    render();
  </script>
</body>
</html>
